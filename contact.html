<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact Jaanaaka for technical inquiries or collaborations.">
    <title>Contact | Jaanaaka Portfolio</title>
    
    <link rel="stylesheet" href="styles/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/components.js" defer></script>
    <script src="js/main.js" defer></script>
</head>
<body>
    <header></header>
    <main class="container">
        <section style="max-width: 600px; margin: 0 auto;">
            <h1 class="section-title">Get in Touch</h1>
            <p style="text-align: center; margin-bottom: 2rem;">Interested in a collaboration or have a technical query? Drop me a message below.</p>
            
            <form id="contact-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Name</label>
                    <input type="text" id="name" name="name" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email</label>
                    <input type="email" id="email" name="email" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                <div>
                    <label for="message" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message</label>
                    <textarea id="message" name="message" rows="5" required style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"></textarea>
                </div>
                <button type="submit" style="background: var(--primary-blue); color: #fff; padding: 1rem; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; transition: background 0.3s ease;">
                    Send Message
                </button>
            </form>
        </section>
    </main>
    <footer></footer>
</body>
</html>
